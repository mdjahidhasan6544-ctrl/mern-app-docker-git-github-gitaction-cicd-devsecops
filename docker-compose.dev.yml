# ============================================
# BagStore — Local Development Docker Compose
# ============================================
# Builds images from source instead of pulling
# Database: MongoDB Atlas (set MONGODB_URI in .env)
# ============================================
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.dev.yml up --build
#
# ============================================

services:
  # ---- Backend API Server ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bagstore-backend-dev
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - bagstore-network

  # ---- Frontend (Nginx + React) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: bagstore-frontend-dev
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bagstore-network

# ---- Persistent Volumes ----
volumes:
  uploads:
    driver: local

# ---- Network ----
networks:
  bagstore-network:
    driver: bridge
