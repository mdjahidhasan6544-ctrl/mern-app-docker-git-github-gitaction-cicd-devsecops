# ============================================
# SonarCloud / SonarQube Configuration
# ============================================
# GitHub Actions can override project metadata with:
# SONAR_PROJECT_KEY, SONAR_PROJECT_NAME, and SONAR_ORGANIZATION.
# ============================================

sonar.projectKey=bagstore
sonar.projectName=BagStore

# Source directories
sonar.sources=backend,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/uploads/**,**/coverage/**,**/*.test.js,**/*.spec.js

# Language settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
