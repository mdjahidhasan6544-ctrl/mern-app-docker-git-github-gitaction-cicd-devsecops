name: BagStore CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  validate-deploy-config:
    name: Validate deploy config
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      AWS_HOST: ${{ secrets.AWS_HOST }}
      AWS_USER: ${{ secrets.AWS_USER }}
      AWS_SSH_PRIVATE_KEY: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || secrets.APP_SECRET }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      NODE_ENV: ${{ vars.NODE_ENV || 'production' }}
      APP_PORT: ${{ vars.APP_PORT || '80' }}
      SERVER_PORT: ${{ vars.SERVER_PORT || '5000' }}
      DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || format('{0}/bagstore', secrets.DOCKERHUB_USERNAME) }}
      DOCKER_TAG: ${{ vars.DOCKER_TAG || 'latest' }}
    steps:
      - name: Check required GitHub Secrets and Variables
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          required=(
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            AWS_HOST
            AWS_USER
            AWS_SSH_PRIVATE_KEY
            MONGODB_URI
            JWT_SECRET
            SONAR_TOKEN
            SONAR_HOST_URL
            NODE_ENV
            APP_PORT
            SERVER_PORT
            DOCKER_IMAGE
            DOCKER_TAG
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub value: $name" >&2
              missing=1
            else
              echo "$name is configured."
            fi
          done

          for port_name in APP_PORT SERVER_PORT; do
            port_value="${!port_name:-}"
            if ! [[ "$port_value" =~ ^[0-9]+$ ]] || [ "$port_value" -lt 1 ] || [ "$port_value" -gt 65535 ]; then
              echo "$port_name must be a TCP port between 1 and 65535." >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  lint-and-test:
    name: Install, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --if-present

      - name: Test frontend
        working-directory: frontend
        run: npm run test --if-present

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint --if-present

      - name: Test backend
        working-directory: backend
        run: npm run test --if-present

  source-security-scan:
    name: SonarQube and OWASP scan
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'bagstore' }}
      SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME || 'BagStore' }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      SONAR_SOURCES: ${{ vars.SONAR_SOURCES || 'backend,frontend' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply Sonar project metadata
        shell: bash
        run: |
          set -euo pipefail
          sonar_host_url="${SONAR_HOST_URL%/}"
          sonar_organization="${SONAR_ORGANIZATION:-}"

          if [ -z "$sonar_organization" ] && [ "$sonar_host_url" = "https://sonarcloud.io" ]; then
            sonar_organization="$GITHUB_REPOSITORY_OWNER"
          fi

          {
            echo "sonar.projectKey=${SONAR_PROJECT_KEY}"
            echo "sonar.projectName=${SONAR_PROJECT_NAME}"
            echo "sonar.host.url=${sonar_host_url}"
            echo "sonar.sources=${SONAR_SOURCES}"
            if [ -n "$sonar_organization" ]; then
              echo "sonar.organization=${sonar_organization}"
            fi
          } >> sonar-project.properties

      - name: SonarQube scan
        id: sonarqube_scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

      - name: Report SonarQube scan warning
        if: steps.sonarqube_scan.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::SonarQube scan failed. Check that SONAR_TOKEN belongs to the configured SonarQube/SonarCloud project and set SONAR_HOST_URL when using a self-hosted SonarQube server."

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: bagstore
          path: .
          format: HTML
          args: >-
            --failOnCVSS 7
            --enableRetired
            --exclude "**/node_modules/**"
            --exclude "**/dist/**"
            --exclude "**/build/**"

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 14

  build-scan-push:
    name: Build, scan, and push images
    runs-on: ubuntu-latest
    needs:
      - validate-deploy-config
      - lint-and-test
      - source-security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      BACKEND_IMAGE: ${{ vars.DOCKER_IMAGE || format('{0}/bagstore', secrets.DOCKERHUB_USERNAME) }}-backend
      FRONTEND_IMAGE: ${{ vars.DOCKER_IMAGE || format('{0}/bagstore', secrets.DOCKERHUB_USERNAME) }}-frontend
      DOCKER_TAG: ${{ vars.DOCKER_TAG || 'latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Pull Docker base images
        shell: bash
        run: |
          set -euo pipefail
          images=(
            node:22-alpine
            nginx:stable-alpine
          )

          for image in "${images[@]}"; do
            for attempt in 1 2 3; do
              if docker pull "$image"; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "Failed to pull $image after $attempt attempts." >&2
                exit 1
              fi

              sleep $((attempt * 10))
            done
          done

      - name: Build backend image locally
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build frontend image locally
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_PUBLIC_API_URL=

      - name: Trivy scan backend image
        id: trivy_backend
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ env.DOCKER_TAG }}
          format: sarif
          output: trivy-backend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan frontend image
        id: trivy_frontend
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ env.DOCKER_TAG }}
          format: sarif
          output: trivy-frontend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy backend SARIF
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      - name: Upload Trivy frontend SARIF
        if: always() && hashFiles('trivy-frontend-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif
          category: trivy-frontend

      - name: Report Trivy findings warning
        if: steps.trivy_backend.outcome == 'failure' || steps.trivy_frontend.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Trivy found high or critical image vulnerabilities. SARIF results were uploaded to GitHub code scanning. Set repository variable TRIVY_FAIL_ON_FINDINGS=true to make these findings block the pipeline."

      - name: Fail on Trivy findings
        if: vars.TRIVY_FAIL_ON_FINDINGS == 'true' && (steps.trivy_backend.outcome == 'failure' || steps.trivy_frontend.outcome == 'failure')
        run: exit 1

      - name: Push Docker images
        env:
          GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          docker push "${BACKEND_IMAGE}:${DOCKER_TAG}"
          docker push "${BACKEND_IMAGE}:${GIT_SHA}"
          docker push "${FRONTEND_IMAGE}:${DOCKER_TAG}"
          docker push "${FRONTEND_IMAGE}:${GIT_SHA}"

  deploy-to-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Compose and validation script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: docker-compose.yml,scripts/validate-env.sh
          target: ${{ vars.DEPLOY_DIR || '~/deploy' }}

      - name: Generate env and restart Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          NODE_ENV: ${{ vars.NODE_ENV || 'production' }}
          APP_PROTOCOL: ${{ vars.APP_PROTOCOL || 'http' }}
          APP_PORT: ${{ vars.APP_PORT || '80' }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '5000' }}
          DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || format('{0}/bagstore', secrets.DOCKERHUB_USERNAME) }}
          DOCKER_TAG: ${{ vars.DOCKER_TAG || 'latest' }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          ALLOWED_ORIGINS_EXTRA: ${{ vars.ALLOWED_ORIGINS_EXTRA }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || secrets.APP_SECRET }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          envs: DEPLOY_DIR,NODE_ENV,APP_PROTOCOL,APP_PORT,SERVER_PORT,DOCKER_IMAGE,DOCKER_TAG,DOMAIN_NAME,ALLOWED_ORIGINS_EXTRA,AWS_HOST,MONGODB_URI,JWT_SECRET,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="${DEPLOY_DIR:-}"
            APP_PROTOCOL="${APP_PROTOCOL:-http}"
            DOMAIN_NAME="${DOMAIN_NAME:-}"
            ALLOWED_ORIGINS_EXTRA="${ALLOWED_ORIGINS_EXTRA:-}"

            DEPLOY_PATH="${DEPLOY_DIR:-$HOME/deploy}"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            PUBLIC_HOST="${DOMAIN_NAME:-$AWS_HOST}"
            FRONTEND_URL="${APP_PROTOCOL}://${PUBLIC_HOST}"
            if [ "$APP_PORT" != "80" ] && [ "$APP_PORT" != "443" ]; then
              FRONTEND_URL="${FRONTEND_URL}:${APP_PORT}"
            fi

            BACKEND_URL="${APP_PROTOCOL}://${PUBLIC_HOST}:${SERVER_PORT}"
            PUBLIC_API_URL="${FRONTEND_URL}/api"
            ALLOWED_ORIGINS="$FRONTEND_URL"

            if [ "$PUBLIC_HOST" != "$AWS_HOST" ]; then
              AWS_FRONTEND_URL="${APP_PROTOCOL}://${AWS_HOST}"
              if [ "$APP_PORT" != "80" ] && [ "$APP_PORT" != "443" ]; then
                AWS_FRONTEND_URL="${AWS_FRONTEND_URL}:${APP_PORT}"
              fi
              ALLOWED_ORIGINS="${ALLOWED_ORIGINS},${AWS_FRONTEND_URL}"
            fi

            if [ -n "${ALLOWED_ORIGINS_EXTRA:-}" ]; then
              ALLOWED_ORIGINS="${ALLOWED_ORIGINS},${ALLOWED_ORIGINS_EXTRA}"
            fi

            umask 077
            cat > .env <<EOF
            NODE_ENV=$NODE_ENV
            APP_PROTOCOL=$APP_PROTOCOL
            AWS_HOST=$AWS_HOST
            DOMAIN_NAME=$DOMAIN_NAME
            APP_PORT=$APP_PORT
            SERVER_PORT=$SERVER_PORT
            FRONTEND_URL=$FRONTEND_URL
            BACKEND_URL=$BACKEND_URL
            PUBLIC_API_URL=$PUBLIC_API_URL
            ALLOWED_ORIGINS=$ALLOWED_ORIGINS
            MONGODB_URI=$MONGODB_URI
            JWT_SECRET=$JWT_SECRET
            DOCKER_IMAGE=$DOCKER_IMAGE
            DOCKER_TAG=$DOCKER_TAG
            EOF
            chmod 600 .env

            chmod +x scripts/validate-env.sh
            bash scripts/validate-env.sh .env

            echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

            echo "DockerHub login completed; checking Docker Compose availability."
            compose_v2_status=0
            docker compose version >/dev/null 2>&1 || compose_v2_status=$?
            compose_v1_status=0
            command -v docker-compose >/dev/null 2>&1 || compose_v1_status=$?
            compose_v1_env_status=1
            if [ "$compose_v1_status" -eq 0 ]; then
              compose_v1_env_status=0
              docker-compose --env-file .env version >/dev/null 2>&1 || compose_v1_env_status=$?
            fi
            echo "Compose probe: v2=$compose_v2_status v1=$compose_v1_status v1_env=$compose_v1_env_status"

            run_compose() {
              if [ "$compose_v2_status" -eq 0 ]; then
                echo "Using Docker Compose v2 plugin."
                docker compose --env-file .env "$@"
              elif [ "$compose_v1_status" -eq 0 ]; then
                if [ "$compose_v1_env_status" -eq 0 ]; then
                  echo "Using docker-compose with --env-file support."
                  docker-compose --env-file .env "$@"
                else
                  echo "Using docker-compose with the .env file from $DEPLOY_PATH."
                  docker-compose "$@"
                fi
              else
                echo "Docker Compose is not installed; using docker/compose:1.29.2 helper container."
                docker run --rm \
                  -v /var/run/docker.sock:/var/run/docker.sock \
                  -v "$PWD:/workspace" \
                  -w /workspace \
                  docker/compose:1.29.2 \
                  --env-file .env "$@"
              fi
            }

            run_compose pull
            run_compose up -d --remove-orphans
            docker image prune -f
